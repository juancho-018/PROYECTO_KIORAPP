services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:3000/api}
        - PUBLIC_WEGLOT_API_KEY=${PUBLIC_WEGLOT_API_KEY:-wg_9377AA8B32}
        - PUBLIC_SENTRY_DSN=https://939080ed4cff9f9de326409db475b4f1@o4511345952686080.ingest.us.sentry.io/4511346045091840

    container_name: kiora_frontend_app
    restart: unless-stopped
