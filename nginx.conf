server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Evita que Nginx haga redirect 301 agregando trailing slash
    # (eso causaba que se perdiera el puerto en la URL)
    absolute_redirect off;

    # Soporte para Web App Manifest MIME
    include /etc/nginx/mime.types;
    types {
        application/manifest+json webmanifest;
    }

    # Redirección inmediata a login (Evita el pantallazo de "Redirecting...")
    location = / {
        return 301 /login;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Soporte para páginas de Astro sin extensión .html
    location ~ ^(.+)$ {
        try_files $uri $uri/ $uri.html =404;
    }

    # EL SERVICE WORKER NUNCA DEBE SER CACHEADO (Vital para PWA)
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        access_log off;
    }

    # Caché estricta para assets de Astro y PWA (js, css, woff, imágenes)
    location ~* \.(?:css|js|map|jpe?g|gif|png|ico|svg|woff2?|json|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Evitar caché de index.html para que los deploys sean inmediatos
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ^~ /api/ {
        proxy_pass http://host.docker.internal:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forzar el origin si es necesario para evitar problemas de CORS remanentes
        proxy_hide_header 'Access-Control-Allow-Origin';
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    error_page 404 /404.html;
}
