server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Evita que Nginx haga redirect 301 agregando trailing slash
    # (eso causaba que se perdiera el puerto en la URL)
    absolute_redirect off;

    # Soporte para Web App Manifest MIME
    include /etc/nginx/mime.types;
    types {
        application/manifest+json webmanifest;
    }

    # Redirección inmediata a login (Evita el pantallazo de "Redirecting...")
    location = / {
        return 301 /login;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Soporte para el Panel de Administración (React SPA)
    location /panel {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri $uri/ /panel/index.html;
    }

    # EL SERVICE WORKER NUNCA DEBE SER CACHEADO (Vital para PWA)
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        access_log off;
    }

    # Caché estricta para assets de Astro y PWA (js, css, woff, imágenes)
    location ~* \.(?:css|js|map|jpe?g|gif|png|ico|svg|woff2?|json|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Evitar caché explícita de archivos HTML
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # NOTA: El frontend es un sitio estático. Las peticiones API se hacen
    # directamente desde el browser JS al backend en Azure (http://20.110.129.152:3000).
    # No se necesita proxy inverso de Nginx para la API.

    error_page 404 /404.html;
}
