server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Evita que Nginx haga redirect 301 agregando trailing slash
    # (eso causaba que se perdiera el puerto en la URL)
    absolute_redirect off;

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Soporte para páginas de Astro sin extensión .html
    location ~ ^(.+)$ {
        try_files $uri $uri/ $uri.html =404;
    }

    # Evitar caché de index.html para que los deploys sean inmediatos
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    error_page 404 /404.html;
}
